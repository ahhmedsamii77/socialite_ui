<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient (Indigo to Pink to Orange) representing active social communication -->
    <linearGradient id="socialite-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" /> <!-- Indigo-500 -->
      <stop offset="50%" stop-color="#EC4899" /> <!-- Pink-500 -->
      <stop offset="100%" stop-color="#F97316" /> <!-- Orange-500 -->
    </linearGradient>
    <filter id="glowing-effect" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Sleek Dark Rounded Squircle Background -->
  <rect width="128" height="128" rx="36" fill="#0F172A" />

  <!-- Subtle Inner Border -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="none" stroke="url(#socialite-grad)" stroke-width="2.5" opacity="0.3" />

  <!-- Socialite Icon: Interlocking S-shape styled like connection nodes & speech bubbles -->
  <g filter="url(#glowing-effect)" transform="translate(16, 16)">
    <!-- Main stylized 'S' loop representing two combined messages/people -->
    <path fill="url(#socialite-grad)" d="M48 9.5C26.7 9.5 9.5 26.7 9.5 48c0 9.2 3.2 17.6 8.6 24.3l-5.3 11.2c-1 2.1.9 4.5 3.2 3.9l13.1-3.3c6 3.6 13 5.7 20.9 5.7 21.3 0 38.5-17.2 38.5-38.5S70.3 9.5 48 9.5zm-5 44c0 3-2.5 5.5-5.5 5.5-3 0-5.5-2.5-5.5-5.5s2.5-5.5 5.5-5.5c3 0 5.5 2.5 5.5 5.5zm19.5-6c-3.6 0-6.5-2.9-6.5-6.5S53.9 31 57.5 31 64 33.9 64 37.5 61.1 44 57.5 44zm6 21c-3 0-5.5-2.5-5.5-5.5s2.5-5.5 5.5-5.5 5.5 2.5 5.5 5.5-2.5 5.5-5.5 5.5z" />

    <!-- Stylized connection track for the 'S' logo flow -->
    <path fill="#FFFFFF" opacity="0.9" d="M37.5 51.5c.3-.8.9-1.5 1.7-1.9L49 44c1.1-.6 2.5-.2 3.1.9s.2 2.5-.9 3.1l-9.8 5.6c-.8.5-1.8.4-2.5-.2-.7-.6-1-1.3-1.4-1.9zM57.5 39.5c-.3.8-.9 1.5-1.7 1.9l-9.8 5.6c-1.1.6-2.5.2-3.1-.9s-.2-2.5.9-3.1l9.8-5.6c.8-.5 1.8-.4 2.5.2.7.6 1 1.3 1.4 1.9z" />
  </g>
</svg>
